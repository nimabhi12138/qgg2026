	<title>广告猎手后台维护系统 - 显示参数</title>
	<script>
		var g_strModuleParam = "";
		var g_AgentID = "6877";
		var g_AgentID_ToDisplay = "";
	</script>
	<script type="text/javascript" src="/web/Public/js/tpljs/client_param_mng.html.js"></script>
</head>

<body>
 	<div id="" class="easyui-panel" title="" style="width:100%;padding:10px;">
   	<div style="width:100%;height:25px;padding:0px;">
   		<div style="clear:both;"></div>
  	</div>
  		<form id="frmClientParam" style="">
		    <table id="tblClientParamList" class="table table-bordered table-hover" style="width:98%;">
		      <tbody id="tbdClientParamList">
		    	</tbody>
		    </table>
				<button type="button" class="btn btn-warning" style="margin:auto auto;width:100px;" onclick="Submit_EditClientParam();">
					设置
				</button>
	   	</form>
	   	
	</div>
  
  
<div id="divEditClientParamDialog" class="" title="新增客户端显示参数" data-options="iconCls:'icon-edit'" style="width:600px;height:500px;padding:10px;display:none;">
	<form id="frmEditClientParam" method="POST">
   <table class="table table-striped table-condensed" style="width:100%">
     <tr>
       <td style="width:25%;">客户端显示参数名</td>
       <td style="width:60%;">
       			<!--ID字段特殊处理，input元素的ID和NAME属性不一样-->
       			<input type="hidden" id="client_param_id" name="Id" value="" />
          	<input type="text" id="ClientParamID" name="ClientParamID" value="" style="width:300px;" />
       </td>
       <td class="red_font">*</td>
     </tr>
     <tr>
       <td style="width:25%;">密码</td>
       <td style="width:60%;">
          	<input type="password" id="PassWD" name="PassWD" value="" style="width:300px;" />
       </td>
       <td class="red_font">*</td>
     </tr>
     <tr>
       <td style="width:25%;">确认密码</td>
       <td style="width:60%;">
          	<input type="password" id="PassWD_Confirm" name="" value="" style="width:300px;" />
       </td>
       <td class="red_font">*</td>
     </tr>
     <tr>
       <td style="width:25%;">客户端显示参数类型</td>
       <td style="width:60%;">
          	<select type="text" id="LevelType" name="LevelType" style="width:300px;">
          		<option value="0">管理员</option>
          		<option value="1">一级代理商</option>
          		<option value="2">二级代理商</option>
          	</select>
       </td>
       <td class="red_font">*</td>
     </tr>
     <tr>
       <td style="width:10em">&nbsp;</td>
       <td>
       	<a id="" href="#" class="easyui-linkbutton" icon="icon-ok">确定</a>
       </td>
       <td>&nbsp;</td>
     </tr>
   </table>
   </form>

</body>
